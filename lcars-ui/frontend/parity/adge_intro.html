<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LCARS parity — adge_intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --blue:#9897fc; --lilac:#cc9bcc; --lilac2:#c998cb; --yellow:#fdcb64;
    --salmon:#ce6262; --salmon2:#ca6565; --orange:#fc9800; --bg:#000;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);}
  .stage{position:relative;width:1682px;height:1080px;background:var(--bg);
    overflow:hidden;font-family:"Antonio",sans-serif;font-weight:700;}
  .abs{position:absolute;}
  /* cell label text: dark, bold, condensed, sits at a corner of a colour cell */
  .lbl{position:absolute;bottom:10px;color:#000;font-size:24px;letter-spacing:.5px;}
  .lbl.l{left:14px;} .lbl.r{right:14px;}

  /* ---- header ---- */
  .h-bar{left:16px;top:22px;width:812px;height:30px;background:var(--lilac);
    border-radius:15px 4px 4px 15px;}
  .h-title{right:96px;top:14px;color:var(--orange);font-size:38px;letter-spacing:1px;}
  .h-cap{top:22px;width:46px;height:30px;background:var(--blue);border-radius:15px;}

  /* ---- cell band ---- */
  .cell{top:66px;height:110px;}
  /* ---- left readout rows ---- */
  .row{position:absolute;left:120px;height:30px;display:flex;align-items:center;gap:6px;}
  .seg{width:22px;height:30px;border-radius:4px;}
  .big{font-size:34px;color:var(--blue);min-width:54px;text-align:right;line-height:1;}
  .pill{height:30px;display:flex;align-items:center;justify-content:flex-start;
    padding:0 10px;border-radius:15px;color:#000;font-size:20px;min-width:78px;}
  .cap{width:34px;height:30px;border-radius:15px;}

  /* ---- right status lines ---- */
  .stat{position:absolute;right:152px;color:var(--orange);font-size:30px;
    text-align:right;letter-spacing:.5px;}
  .swatch{position:absolute;width:26px;height:30px;border-radius:6px;right:110px;}

  /* ---- right rail + elbow ---- */
  .rail{right:16px;top:66px;width:86px;height:846px;background:var(--salmon);
    border-radius:0 0 30px 30px;}
  .band-salmon{left:1064px;top:66px;width:602px;height:64px;background:var(--salmon);
    border-radius:0 14px 0 0;}
  .elbow-carve{left:1064px;top:130px;width:516px;height:60px;background:var(--bg);
    border-radius:0 0 0 30px;}
  .term{right:8px;top:560px;width:104px;height:78px;background:var(--orange);
    border-radius:8px;display:flex;align-items:center;justify-content:center;
    color:#000;font-size:34px;}

  /* ---- footer ---- */
  .f-cap{left:16px;bottom:18px;width:46px;height:30px;background:var(--blue);border-radius:15px;}
  .f-title{left:78px;bottom:14px;color:var(--orange);font-size:34px;letter-spacing:1px;}
  .f-bar{right:16px;bottom:18px;width:1240px;height:30px;background:var(--lilac);border-radius:15px;}
</style>
</head>
<body>
<div class="stage">
  <!-- header -->
  <div class="abs h-bar"></div>
  <div class="abs h-title">LCARS COMPUTER ACCESS 54 ADGE &#9679;</div>
  <div class="abs h-cap" style="right:16px;"></div>

  <!-- cell band -->
  <div class="abs cell" style="left:16px;width:150px;background:var(--blue);">  <span class="lbl l">COMM</span></div>
  <div class="abs cell" style="left:172px;width:214px;background:var(--yellow);"><span class="lbl r">SYSTEMS</span></div>
  <div class="abs cell" style="left:392px;width:466px;background:var(--lilac2);"><span class="lbl r">MODE SELECT</span></div>
  <div class="abs cell" style="left:864px;width:190px;background:var(--blue);">  <span class="lbl r">LCARS</span></div>

  <!-- right rail + elbow -->
  <div class="abs band-salmon"></div>
  <div class="abs elbow-carve"></div>
  <div class="abs rail"></div>
  <div class="abs" style="right:30px;top:138px;color:#000;font-size:22px;">2005</div>
  <div class="abs term">55</div>

  <!-- left readout rows -->
  <div class="row" style="top:192px;"><span class="seg" style="background:var(--lilac)"></span><span class="big">08</span><span class="pill" style="background:var(--blue)">334</span><span class="cap" style="background:var(--blue)"></span></div>
  <div class="row" style="top:228px;"><span class="seg" style="background:var(--salmon)"></span><span class="big" style="color:var(--salmon)">90</span></div>
  <div class="row" style="top:264px;"><span class="seg" style="background:var(--orange)"></span><span class="big">78</span><span class="pill" style="background:var(--lilac)">139</span><span class="cap" style="background:var(--lilac)"></span></div>
  <div class="row" style="top:300px;"><span class="seg" style="background:var(--lilac)"></span><span class="big" style="color:var(--lilac)">67</span></div>
  <div class="row" style="top:336px;left:174px;"><span class="big">89</span><span class="pill" style="background:var(--salmon)">979</span><span class="cap" style="background:var(--salmon)"></span></div>
  <div class="row" style="top:372px;"><span class="seg" style="background:var(--salmon)"></span><span class="big" style="color:var(--salmon)">77</span><span class="pill" style="background:var(--orange)">767</span><span class="cap" style="background:var(--orange)"></span></div>
  <div class="row" style="top:408px;"><span class="seg" style="background:var(--blue)"></span><span class="big">01</span><span class="pill" style="background:var(--lilac)">999</span><span class="cap" style="background:var(--lilac)"></span></div>
  <div class="row" style="top:444px;"><span class="seg" style="background:var(--orange)"></span><span class="big" style="color:var(--orange)">54</span><span class="pill" style="background:var(--yellow)">999</span><span class="cap" style="background:var(--yellow)"></span></div>

  <!-- right status lines -->
  <div class="stat" style="top:386px;">AUDIO-VISUAL INTERFACE READY</div>
  <div class="swatch" style="top:386px;background:var(--lilac);"></div>
  <div class="stat" style="top:428px;">USER INPUT PATHWAYS DEFINED</div>
  <div class="swatch" style="top:428px;background:var(--yellow);"></div>
  <div class="stat" style="top:470px;">UNIVERSAL TRANSLATOR</div>
  <div class="swatch" style="top:470px;background:var(--blue);"></div>

  <!-- footer -->
  <div class="abs f-cap"></div>
  <div class="abs f-title">CONSOLE 54 ADGE</div>
  <div class="abs f-bar"></div>
</div>
</body>
</html>
